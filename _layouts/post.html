---
layout: default
---
<div class="container mx-auto px-4 py-12">
    <article class="max-w-4xl mx-auto bg-surface border-tech p-8 rounded-md">
        <header class="mb-8">
            <h1 class="text-4xl md:text-5xl font-bold font-tech text-recOrange uppercase tracking-wider mb-4">{{ page.title }}</h1>
            <p class="text-gray-400 font-sans text-sm">
                {% if page.date %}{{ page.date | date: "%B %-d, %Y" }}{% endif %}
                {% if page.author %} • by {{ page.author }}{% endif %}
            </p>
        </header>
        <div class="w-24 h-1 bg-gradient-to-r from-recBlue to-recOrange mb-8"></div>
        <div class="prose prose-invert prose-lg max-w-none font-sans text-gray-300">
            {{ content }}
        </div>
    </article>
</div>
